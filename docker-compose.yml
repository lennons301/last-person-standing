services:
  postgres:
    image: postgres:17
    container_name: lps-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lps_dev
      POSTGRES_USER: lps
      POSTGRES_PASSWORD: lps
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lps -d lps_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
